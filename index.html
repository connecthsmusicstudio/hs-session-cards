  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0806;

    align-items: center;

    overflow: hidden;
  }

  .hero-photo {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0.35;
  }

  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(13,11,8,0.2) 0%, rgba(13,11,8,0.7) 100%);
  }

  .hero-bg-text {
    position: absolute;
    font-family: 'Cormorant Garamond', serif;
    font-size: 160px;
    font-weight: 300;

    pointer-events: none;

  .hero-tag {
    position: absolute;
    top: 18px;
    left: 20px;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(196,154,108,0.55);
    font-family: 'DM Sans', sans-serif;
    z-index: 2;
  }

  .hero-date {
    position: absolute;
    top: 18px;
    right: 20px;

    letter-spacing: 0.1em;

    position: relative;

    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .hero-icon {

    height: 56px;
    border-radius: 50%;
    background: rgba(196,154,108,0.08);
    border: 0.5px solid rgba(196,154,108,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .hero-song {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 15px;
    color: rgba(250,248,245,0.5);
    letter-spacing: 0.04em;
  }

  /* ─── BODY ─── */

    padding: 22px 20px 32px;
  }

  .client-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 300;
    color: #faf8f5;
    line-height: 1.1;

  .client-name-secondary {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-weight: 300;
    color: rgba(250,248,245,0.35);
    margin: 3px 0 20px;
    letter-spacing: 0.08em;
  }

  .section-label {
    font-size: 8.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(250,248,245,0.25);
    margin-bottom: 10px;
    font-family: 'DM Sans', sans-serif;
  }

  /* ─── STATS GRID ─── */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 7px;
    margin-bottom: 16px;
  }

  .stat {
    background: rgba(250,248,245,0.035);
    border-radius: 10px;
    padding: 11px 12px 10px;
    border: 0.5px solid rgba(250,248,245,0.06);
    cursor: pointer;
    transition: background 0.2s;
    text-decoration: none;
    display: block;
  }

  .stat:hover {
    background: rgba(250,248,245,0.06);
  }

  .stat-lbl {
    font-size: 8px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 5px;
    font-family: 'DM Sans', sans-serif;
  }

  .stat-val {
    font-family: 'Cormorant Garamond', serif;
    font-size: 21px;
    font-weight: 600;
    display: block;
    line-height: 1;
  }

  .stat-hint {
    font-size: 8px;
    display: block;
    margin-top: 4px;
    opacity: 0.5;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.04em;
  }

  /* stat colour themes */
  .gold .stat-lbl { color: rgba(196,154,108,0.55); }
  .gold .stat-val { color: #c49a6c; }
  .gold .stat-hint { color: #c49a6c; }

  .purple .stat-lbl { color: rgba(167,139,220,0.55); }
  .purple .stat-val { color: #a78bdc; }
  .purple .stat-hint { color: #a78bdc; }

  .teal .stat-lbl { color: rgba(79,191,171,0.55); }
  .teal .stat-val { color: #4fbfab; }
  .teal .stat-hint { color: #4fbfab; }

  .neutral .stat-lbl { color: rgba(250,248,245,0.28); }
  .neutral .stat-val { color: rgba(250,248,245,0.6); }
  .neutral .stat-hint { color: rgba(250,248,245,0.4); }

  /* ─── PRODUCER'S MOMENT ─── */
  .quote-wrap {

    font-family: 'DM Sans', sans-serif;

    color: rgba(250,248,245,0.45);
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    padding: 10px 12px;
    text-align: center;
    letter-spacing: 0.04em;
    cursor: pointer;
    text-decoration: none;

    transition: background 0.2s;

  .btn-footer:hover {
    background: rgba(250,248,245,0.07);

  /* ─── LOGO ─── */
  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 10px;
    color: rgba(196,154,108,0.22);
    text-align: center;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  /* ─── LOADING / ERROR STATES ─── */
  .state-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;

    font-family: 'Cormorant Garamond', serif;

    color: rgba(250,248,245,0.25);

  .loading-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(196,154,108,0.4);
    display: inline-block;
    margin: 0 3px;
    animation: pulse 1.4s ease-in-out infinite;
  }

  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 480px) {
    .card { max-width: 100%; }
    .hero { height: 240px; }
  }
</style>

<script>
  // ─── YOUR CREDENTIALS ───────────────────────────────────────
  const AIRTABLE_TOKEN  = 'pathARNIUbq4623Wq.88fd55755fa545b7520c8e104204dedb1ba99eb8f6147737b23fc15de842166b';

  // Parse slug — handles both /session/slug and /session/slug/stories
  function getSlug() {
    const parts = window.location.pathname.split('/session/');
    if (!parts[1]) return null;
    return parts[1].replace(/\/stories\/?$/, '').replace(/\/$/, '');
  }

  function isStoriesRoute() {
    return /\/stories\/?$/.test(window.location.pathname);
  }

  // Extract session ID number from slug
 function getSessionId(slug) {
    return slug ? slug : null;
  }

  // Format date nicely
  function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-SG', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  // Calculate days since session
  function daysSince(dateStr) {
    if (!dateStr) return 999;
    const session = new Date(dateStr);
    const now = new Date();
    return Math.floor((now - session) / (1000 * 60 * 60 * 24));
  }

  // Rebook gift by session type
  function getGift(sessionType) {
    if (sessionType === 'Production') return 'Free 30-min vocal coaching consult';
    return 'Complimentary NFC CD (worth $20)';
  }

  // Render stat "what does this mean?" link
  function statLink(anchor) {
    return `https://hsmusicstudio.sg/vocal-guide#${anchor}`;
  }

  // Render the full card
  function renderCard(r) {
    const f = r.fields;
    const voiceMap = {
  'Soprano': '女高音', 'Mezzo-soprano': '次女高音',
  'Alto': '女低音', 'Tenor': '男高音',
  'Baritone': '男中音', 'Bass': '男低音',
  'Undetermined': '待定'
};
const diffMap = {
  'Beginner': '初级', 'Intermediate': '中级',
  'Advanced': '高级', 'Expert': '高级', 'Insane': '地狱级'
};
    const sessionType = f['Session Type'] || 'Studio Experience';
    const isProduction = sessionType === 'Production';
    const days = daysSince(f['Session Date']);
    const rebookActive = f['Rebook Offer Active'] !== false;
    const daysLeft = 7 - days;
    const rebookExpired = days > 7 || !rebookActive;

    // Hero photo
    const photoStyle = f['Session Photo URL']
      ? `background-image: url('${f['Session Photo URL']}');`
      : '';

    // Stat 3: voice type (Studio) or tracks recorded (Production)
    const stat3Label = isProduction ? 'Tracks recorded' : 'Voice type';
    const stat3Value = isProduction
      ? (f['Tracks Recorded'] || '—')
      : (f['Voice Type'] ? `${f['Voice Type']} ${voiceMap[f['Voice Type']] || ''}` : '—');
    const stat3Class = 'purple';

    // Stat 6: song difficulty (Studio) or harmonies captured (Production)
    const stat6Label = isProduction ? 'Harmonies' : 'Difficulty';
    const stat6Value = isProduction
      ? (f['Harmonies captured'] || '—')
      : (f['Song Difficulty'] ? `${f['Song Difficulty']} ${diffMap[f['Song Difficulty']] || ''}` : '—');

    // Countdown text
    let countdownHtml = '';
    if (!rebookExpired) {
      const urgent = daysLeft <= 3;
      countdownHtml = `<p class="cta-countdown ${urgent ? 'urgent' : ''}">${daysLeft} day${daysLeft !== 1 ? 's' : ''} remaining</p>`;
    }

    document.getElementById('app').innerHTML = `
      <div class="card">

        <div class="hero">
          ${photoStyle ? `<div class="hero-photo" style="${photoStyle}"></div><div class="hero-overlay"></div>` : '<span class="hero-bg-text">HS</span>'}
          <span class="hero-tag">${sessionType === 'Studio Experience' ? 'Studio Experience · 一日歌手' : sessionType}</span>
          <span class="hero-date">${formatDate(f['Session Date'])}${f['Room'] ? ' · ' + f['Room'] : ''}</span>
          <div class="hero-content" id="hero-content">
  <div class="hero-icon" id="hero-icon" style="${f['Session Photo URL'] ? 'opacity:0.15; background:transparent; border-color:rgba(196,154,108,0.15);' : ''}">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#c49a6c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="2" width="6" height="12" rx="3"/>
                <path d="M5 10a7 7 0 0 0 14 0"/>
                <line x1="12" y1="17" x2="12" y2="21"/>
                <line x1="8" y1="21" x2="16" y2="21"/>
              </svg>
            </div>
            <span class="hero-song">${f['Song / Project Title'] || ''}</span>
          </div>
        </div>

        <div class="body">

          <p class="client-name">${f['Client Name'] || ''}</p>
          ${f['Client name (secondary)'] ? `<p class="client-name-secondary">${f['Client name (secondary)']}</p>` : '<div style="margin-bottom:20px;"></div>'}

          <p class="section-label">Your voice · 你的声音数据</p>

          <div class="stats-grid">
            <a class="stat gold" href="${statLink('highest-note')}" target="_blank">
              <span class="stat-lbl">Highest note <span style="opacity:0.6;font-size:6px;">最高音</span></span>
              <span class="stat-val">${f['Highest Note'] || '—'}</span>
              <span class="stat-hint">tap to learn</span>
            </a>
            <a class="stat gold" href="${statLink('lowest-note')}" target="_blank">
              <span class="stat-lbl">Lowest note <span style="opacity:0.6;font-size:6px;">最低音</span></span>
              <span class="stat-val">${f['Lowest Note'] || '—'}</span>
              <span class="stat-hint">tap to learn</span>
            </a>
            <a class="stat ${stat3Class}" href="${statLink('voice-type')}" target="_blank">
              <span class="stat-lbl">Voice type <span style="opacity:0.6;font-size:6px;">音色类型</span></span>
              <span class="stat-val" style="font-size:${String(stat3Value).length > 5 ? '13px' : '21px'};padding-top:${String(stat3Value).length > 5 ? '4px' : '0'}">${stat3Value}</span>

            <div class="stat neutral">

              <span class="stat-lbl">The flip <span style="opacity:0.6;font-size:6px;">换声点</span></span>

            </a>
            <div class="stat teal">
              <span class="stat-lbl">${stat6Label} <span style="opacity:0.6;font-size:6px;">${isProduction ? '和声' : '难度'}</span></span>
              <span class="stat-val" style="font-size:${String(stat6Value).length > 5 ? '13px' : '21px'};padding-top:${String(stat6Value).length > 5 ? '4px' : '0'}">${stat6Value}</span>
            </div>
          </div>

          ${f["Producer's Moment"] ? `
          <div class="quote-wrap">
            <p class="quote">"${f["Producer's Moment"]}"</p>
            <span class="quote-attr">— Your coach @ HS Music Studio</span>
          </div>` : ''}

          <hr class="divider">

          <div class="cta-box ${rebookExpired ? 'expired' : ''}">
            <div>
              <p class="cta-eyebrow">${rebookExpired ? 'See you next time' : 'Rebook within 7 days'}</p>
              <p class="cta-gift">${rebookExpired ? 'Your card is saved forever' : getGift(sessionType)}</p>
              ${countdownHtml}
            </div>
            ${!rebookExpired ? `<a class="btn-rebook" href="${BOOKING_URL}" target="_blank">Book now</a>` : ''}
          </div>

          <div class="footer-row">
  <a class="btn-footer" id="share-btn" href="#">Share this card</a>
  <a class="btn-footer" href="https://search.google.com/local/writereview?placeid=${GOOGLE_PLACE_ID}" target="_blank">Leave us a review</a>
</div>


          <p class="logo">HS Music Studio</p>

        </div>
      </div>
    `;

  // ── wire share sheet (called after renderCard injects #share-btn) ──
  wireShareSheet();
  }   // ← end of renderCard()

  function wireShareSheet() {
    const shareSheet = document.getElementById('share-sheet');
    const shareBtn   = document.getElementById('share-btn');
    if (!shareSheet || !shareBtn) return;

    shareBtn.addEventListener('click', function(e) {
      e.preventDefault();
      shareSheet.style.display = 'flex';
    });

    document.getElementById('sheet-close').addEventListener('click', function() {
      shareSheet.style.display = 'none';
    });

    shareSheet.addEventListener('click', function(e) {
      if (e.target === shareSheet) shareSheet.style.display = 'none';
    });

    document.getElementById('sheet-share').addEventListener('click', function() {
      shareSheet.style.display = 'none';
      if (navigator.share) {
        navigator.share({
          title: 'My HS Music Studio Session',
          text: 'Check out my session card from HS Music Studio! 🎙 #一日歌手',
          url: window.location.href
        });
      } else {
        navigator.clipboard.writeText(window.location.href);
        this.textContent = 'Link copied!';
      }
    });

    document.getElementById('sheet-copy').addEventListener('click', function() {
      navigator.clipboard.writeText(window.location.href).then(() => {
        this.textContent = '✓ Copied!';
        setTimeout(() => { this.textContent = 'Copy link'; }, 2000);
      });
    });

    document.getElementById('sheet-story').addEventListener('click', function() {
      shareSheet.style.display = 'none';
      // Route to stories view — append /stories to current URL
      const base = window.location.href.split('?')[0].replace(/\/$/, '');
      window.location.href = base + '/stories';
    });
  }

  // ─── STORIES CARD (9:16 full-screen for IG/TikTok screenshot) ───────────
  function renderStoriesCard(r) {
    const f = r.fields;
    const voiceMap = {
      'Soprano':'女高音','Mezzo-soprano':'次女高音','Alto':'女低音',

    document.body.style.padding = '0';

        </div>

          <div style="display:flex;align-items:center;gap:7px;">
            <div style="display:flex;align-items:flex-end;gap:2px;">
              <span style="display:block;width:3px;height:9px;background:#c49a6c;border-radius:2px;"></span>
              <span style="display:block;width:3px;height:15px;background:#c49a6c;border-radius:2px;"></span>
              <span style="display:block;width:3px;height:11px;background:#c49a6c;border-radius:2px;"></span>
              <span style="display:block;width:3px;height:17px;background:#c49a6c;border-radius:2px;"></span>
            </div>
            <span style="font-family:'Cormorant Garamond',serif;font-size:clamp(0.7rem,3vw,0.9rem);letter-spacing:0.12em;color:#c49a6c;">HS MUSIC STUDIO</span>
          </div>
          <span style="font-size:clamp(0.55rem,2.2vw,0.65rem);letter-spacing:0.12em;text-transform:uppercase;color:#e8c99a;opacity:0.8;border:1px solid rgba(196,154,108,0.3);border-radius:20px;padding:0.2rem 0.65rem;">
            ${sessionType === 'Studio Experience' ? '一日歌手' : sessionType}
          </span>
        </div>

        <!-- MIDDLE: name + song + stats -->
        <div style="position:relative;z-index:1;padding:0 clamp(1.2rem,6vw,2.5rem);flex:1;display:flex;flex-direction:column;justify-content:center;">
          <p style="font-size:clamp(0.6rem,2.5vw,0.75rem);letter-spacing:0.15em;text-transform:uppercase;color:#c49a6c;opacity:0.8;margin-bottom:clamp(0.3rem,1.5vw,0.6rem);">
            ${f['Session Date'] ? new Date(f['Session Date']).toLocaleDateString('en-SG',{day:'numeric',month:'short',year:'numeric'}) : ''}
          </p>
          <p style="font-family:'Cormorant Garamond',serif;font-size:clamp(2.8rem,12vw,5.8rem);font-weight:300;color:#faf8f5;line-height:0.92;letter-spacing:-0.01em;">
            ${f['Client Name']||''}
          </p>
          ${f['Client name (secondary)'] ? `<p style="font-family:'Cormorant Garamond',serif;font-size:clamp(1.4rem,5.5vw,2.8rem);font-weight:300;color:#e8c99a;letter-spacing:0.04em;margin-top:0.15em;">${f['Client name (secondary)']}</p>` : ''}
          <p style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(0.85rem,3.5vw,1.3rem);color:#faf8f5;opacity:0.6;margin:clamp(0.5rem,2.5vw,1rem) 0 clamp(1.2rem,5vw,2rem);">
            ${f['Song / Project Title']||''}
          </p>

          <!-- 6-stat row, 3+3 -->
          <div style="display:flex;gap:clamp(0.4rem,1.8vw,0.65rem);flex-wrap:wrap;">
            ${[
              {lbl:'Highest note',val:f['Highest Note']||'—',col:'#c49a6c'},
              {lbl:'Lowest note',val:f['Lowest Note']||'—',col:'#c49a6c'},
              {lbl:isProduction?'Tracks':'Voice type',val:stat3Val,col:'#a78bdc'},
              {lbl:'Takes',val:f['Takes Recorded']||'—',col:'rgba(250,248,245,0.55)'},
              {lbl:'The flip',val:f['The Flip']||'—',col:'#c49a6c'},
              {lbl:stat6Lbl,val:stat6Val,col:'#4fbfab'},
            ].map(s=>`
              <div style="display:flex;flex-direction:column;align-items:center;background:rgba(13,11,8,0.55);border:1px solid rgba(196,154,108,0.18);border-radius:10px;padding:clamp(0.45rem,2vw,0.75rem) clamp(0.5rem,2.5vw,0.9rem);min-width:clamp(55px,16vw,85px);">

        </div>

          ${f["Producer's Moment"] ? `
          <div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(0.82rem,3.2vw,1.1rem);color:#faf8f5;opacity:0.75;line-height:1.45;margin-bottom:clamp(0.75rem,3vw,1.2rem);padding:clamp(0.5rem,2vw,0.9rem);border-left:2px solid #c49a6c;background:rgba(13,11,8,0.45);border-radius:0 8px 8px 0;">
            "${f["Producer's Moment"]}"
          </div>` : ''}
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <span style="font-size:clamp(0.58rem,2.2vw,0.7rem);letter-spacing:0.1em;color:#c49a6c;opacity:0.75;">sessions.hsmusic.studio</span>
            <span style="font-size:clamp(0.58rem,2.2vw,0.68rem);letter-spacing:0.08em;color:#0d0b08;background:#c49a6c;border-radius:20px;padding:clamp(0.28rem,1.2vw,0.4rem) clamp(0.6rem,2.5vw,0.9rem);font-weight:500;">Book your session →</span>
          </div>
        </div>
      </div>

    // Inject Cormorant font if needed
    if (!document.querySelector('link[href*="Cormorant"]')) {
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = 'https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap';
      document.head.appendChild(link);
    }
  }
  // ─────────────────────────────────────────────────────────────────────────

  function showError(msg) {
    document.getElementById('app').innerHTML = `
      <div class="state-screen">
        <p class="state-icon">♩</p>
        <p class="state-title">Session not found</p>
        <p class="state-sub">${msg}</p>
      </div>
    `;
  }

  async function init() {
    const slug = getSlug();
    if (!slug) return showError('No session ID in this URL.');

    const sessionId = getSessionId(slug);
    if (!sessionId) return showError('Invalid session link.');

    try {
      const url = `https://hs-airtable-proxy.connect-d38.workers.dev`;
      const res = await fetch(url);
       
      if (!res.ok) throw new Error(`API error: ${res.status}`);

      const data = await res.json();
      if (!data.records || data.records.length === 0) {
        return showError('No sessions found.');
      }

      const record = data.records.find(r => {
  if (!r.fields['Client Name'] || !r.fields['Session Date']) return false;
  const expectedSlug = r.fields['URL'] ? r.fields['URL'].replace('/session/', '') : '';
  return expectedSlug === sessionId;
});
      if (!record) return showError('This session card doesn\'t exist yet.');

      if (isStoriesRoute()) {
        renderStoriesCard(record);
      } else {
        renderCard(record);
      }

    } catch (err) {
      showError('Something went wrong loading this card.<br>Please try again shortly.');
      console.error(err);
    }
  }

  init();
</script>
