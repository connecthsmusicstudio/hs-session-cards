<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HS Music Studio — Session Story</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #000;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
  }

  .story-frame {
    width: 390px;
    height: 844px;
    position: relative;
    overflow: hidden;
    background: #0d0b08;
  }

  .photo-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center top;
    animation: zoomIn 2s ease-out forwards;
  }

  @keyframes zoomIn {
    from { transform: scale(1.06); }
    to { transform: scale(1); }
  }

  .gradient-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(13,11,8,0.05) 0%,
      rgba(13,11,8,0.0) 25%,
      rgba(13,11,8,0.3) 50%,
      rgba(13,11,8,0.85) 72%,
      rgba(13,11,8,0.97) 100%
    );
  }

  .top-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    padding: 20px 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    z-index: 2;
    animation: fadeIn 0.8s ease-out 0.3s both;
  }

  .top-tag {
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(196,154,108,0.7);
    font-family: 'DM Sans', sans-serif;
  }

  .top-date {
    font-size: 10px;
    letter-spacing: 0.1em;
    color: rgba(250,248,245,0.3);
    font-family: 'DM Sans', sans-serif;
  }

  .content {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 0 24px 40px;
    z-index: 2;
  }

  .client-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 52px;
    font-weight: 300;
    color: #faf8f5;
    line-height: 1;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
    animation: fadeUp 0.7s ease-out 0.4s both;
  }

  .client-name-cn {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 300;
    color: rgba(250,248,245,0.35);
    letter-spacing: 0.08em;
    margin-bottom: 20px;
    animation: fadeUp 0.7s ease-out 0.5s both;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 20px;
  }

  .stat {
    background: rgba(13,11,8,0.55);
    border-radius: 12px;
    padding: 12px 12px 10px;
    border: 0.5px solid rgba(250,248,245,0.1);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .stat:nth-child(1) { animation: fadeUp 0.5s ease-out 0.6s both; }
  .stat:nth-child(2) { animation: fadeUp 0.5s ease-out 0.7s both; }
  .stat:nth-child(3) { animation: fadeUp 0.5s ease-out 0.8s both; }
  .stat:nth-child(4) { animation: fadeUp 0.5s ease-out 0.9s both; }
  .stat:nth-child(5) { animation: fadeUp 0.5s ease-out 1.0s both; }
  .stat:nth-child(6) { animation: fadeUp 0.5s ease-out 1.1s both; }

  .stat-lbl {
    font-size: 8px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 5px;
    font-family: 'DM Sans', sans-serif;
  }

  .stat-val {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 600;
    display: block;
    line-height: 1;
  }

  .gold .stat-lbl { color: rgba(196,154,108,0.6); }
  .gold .stat-val { color: #c49a6c; }
  .purple .stat-lbl { color: rgba(167,139,220,0.6); }
  .purple .stat-val { color: #a78bdc; }
  .teal .stat-lbl { color: rgba(79,191,171,0.6); }
  .teal .stat-val { color: #4fbfab; }
  .neutral .stat-lbl { color: rgba(250,248,245,0.3); }
  .neutral .stat-val { color: rgba(250,248,245,0.65); }

  .quote-row {
    border-left: 1.5px solid rgba(196,154,108,0.35);
    padding: 8px 14px;
    margin-bottom: 20px;
    animation: fadeUp 0.6s ease-out 1.2s both;
  }

  .quote-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 14px;
    color: rgba(250,248,245,0.75);
    line-height: 1.55;
    margin-bottom: 4px;
  }

  .quote-attr {
    font-size: 10px;
    color: rgba(250,248,245,0.3);
    letter-spacing: 0.08em;
    font-family: 'DM Sans', sans-serif;
  }

  .bottom-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    animation: fadeIn 0.6s ease-out 1.35s both;
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    color: rgba(196,154,108,0.35);
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  .url-tag {
    font-size: 9px;
    color: rgba(250,248,245,0.2);
    letter-spacing: 0.06em;
    font-family: 'DM Sans', sans-serif;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* Loading state */
  .loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
  }

  .loading-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(196,154,108,0.4);
    display: inline-block;
    margin: 0 3px;
    animation: pulse 1.4s ease-in-out infinite;
  }
  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }
  .loading-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    color: rgba(250,248,245,0.3);
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>
<div class="story-frame" id="story">
  <div class="loading" id="loading">
    <div>
      <span class="loading-dot"></span>
      <span class="loading-dot"></span>
      <span class="loading-dot"></span>
    </div>
    <p class="loading-text">Loading your story</p>
  </div>
</div>

<script>
  const WORKER_URL = 'https://hs-airtable-proxy.connect-d38.workers.dev';

  function getSlug() {
    const parts = window.location.pathname.split('/story/');
    return parts[1] ? parts[1].replace(/\/$/, '') : null;
  }

  function getSessionId(slug) {
    return slug ? slug : null;
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-SG', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  const voiceMap = {
    'Soprano':'女高音','Mezzo-soprano':'次女高音',
    'Alto':'女低音','Tenor':'男高音',
    'Baritone':'男中音','Bass':'男低音','Undetermined':'待定'
  };

  const diffMap = {
    'Beginner':'初级','Intermediate':'中级',
    'Advanced':'高级','Expert':'高级','Insane':'地狱级'
  };

  function renderStory(r) {
    const f = r.fields;
    const isProduction = f['Session Type'] === 'Production';
    const photoUrl = f['Session Photo URL'] || '';

    const stat3Label = isProduction ? 'Tracks' : 'Voice type';
    const stat3Value = isProduction
      ? (f['Tracks Recorded'] || '—')
      : (f['Voice Type'] ? `${f['Voice Type']} ${voiceMap[f['Voice Type']] || ''}` : '—');

    const stat6Label = isProduction ? 'Harmonies' : 'Difficulty';
    const stat6Value = isProduction
      ? (f['Harmonies captured'] || '—')
      : (f['Song Difficulty'] ? `${f['Song Difficulty']} ${diffMap[f['Song Difficulty']] || ''}` : '—');

    document.getElementById('story').innerHTML = `
      ${photoUrl ? `<div class="photo-bg" style="background-image:url('${photoUrl}');"></div>` : '<div class="photo-bg" style="background:linear-gradient(160deg,#2a1a0e 0%,#0d0b08 100%);"></div>'}
      <div class="gradient-overlay"></div>

      <div class="top-bar">
        <span class="top-tag">${f['Session Type'] === 'Studio Experience' ? 'Studio Experience · 一日歌手' : (f['Session Type'] || 'Studio Experience')}</span>
        <span class="top-date">${formatDate(f['Session Date'])}${f['Room'] ? ' · ' + f['Room'] : ''}</span>
      </div>

      <div class="content">
        <p class="client-name">${f['Client Name'] || ''}</p>
        ${f['Client name (secondary)'] ? `<p class="client-name-cn">${f['Client name (secondary)']}</p>` : '<div style="margin-bottom:20px;"></div>'}

        <div class="stats-grid">
          <div class="stat gold">
            <span class="stat-lbl">Highest 最高音</span>
            <span class="stat-val">${f['Highest Note'] || '—'}</span>
          </div>
          <div class="stat gold">
            <span class="stat-lbl">Lowest 最低音</span>
            <span class="stat-val">${f['Lowest Note'] || '—'}</span>
          </div>
          <div class="stat purple">
            <span class="stat-lbl">${stat3Label}</span>
            <span class="stat-val" style="font-size:${String(stat3Value).length > 8 ? '13px' : '24px'}">${stat3Value}</span>
          </div>
          <div class="stat neutral">
            <span class="stat-lbl">Takes 录音</span>
            <span class="stat-val">${f['Takes Recorded'] || '—'}</span>
          </div>
          <div class="stat gold">
            <span class="stat-lbl">The flip 换声点</span>
            <span class="stat-val">${f['The Flip'] || '—'}</span>
          </div>
          <div class="stat teal">
            <span class="stat-lbl">${stat6Label}</span>
            <span class="stat-val" style="font-size:${String(stat6Value).length > 8 ? '13px' : '24px'}">${stat6Value}</span>
          </div>
        </div>

        ${f["Producer's moment"] ? `
        <div class="quote-row">
          <p class="quote-text">"${f["Producer's moment"]}"</p>
          <span class="quote-attr">— Your coach @ HS Music Studio</span>
        </div>` : ''}

        <div class="bottom-row">
          <span class="logo">HS Music Studio</span>
          <span class="url-tag">sessions.hsmusic.studio</span>
        </div>
      </div>
    `;
  }

  function showError() {
    document.getElementById('story').innerHTML = `
      <div class="loading">
        <p class="loading-text">Story not found</p>
      </div>
    `;
  }

  async function init() {
    const slug = getSlug();
    if (!slug) { showError(); return; }

    try {
      const res = await fetch(WORKER_URL);
      const data = await res.json();
      if (!data.records || data.records.length === 0) { showError(); return; }

      const record = data.records.find(r => {
        const expectedSlug = r.fields['URL'] ? r.fields['URL'].replace('/session/', '') : '';
        return expectedSlug === slug;
      });

      if (!record) { showError(); return; }
      renderStory(record);
    } catch(err) {
      showError();
      console.error(err);
    }
  }

  init();
</script>
</body>
</html>
