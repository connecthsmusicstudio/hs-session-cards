<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HS Music Studio — Session Card</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* ─── CONFIG NOTE ───────────────────────────────────────────
     Replace the 3 values below with your real credentials:
     AIRTABLE_TOKEN  → patpy2sEQHtnng9rU.a6c250bd98177850896f29da39b5e133bda42d762ed74aa121988a9ed2b9bb9f
     AIRTABLE_BASE   → app1UkpbWk0Y6aAUG
     BOOKING_URL     → hsmusicstudio.as.me
     GOOGLE_PLACE_ID → your Google Place ID (Step 10)
  ─────────────────────────────────────────────────────────── */

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0806;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    padding: 0 0 60px;
  }

  .card {
    width: 100%;
    max-width: 480px;
    background: #0d0b08;
  }

  /* ─── HERO ─── */
  .hero {
    width: 100%;
    height: 260px;
    background: #1a1410;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .hero-photo {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0.35;
  }

  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(13,11,8,0.2) 0%, rgba(13,11,8,0.7) 100%);
  }

  .hero-bg-text {
    position: absolute;
    font-family: 'Cormorant Garamond', serif;
    font-size: 160px;
    font-weight: 300;
    color: rgba(196,154,108,0.05);
    letter-spacing: -0.05em;
    user-select: none;
    pointer-events: none;
  }

  .hero-tag {
    position: absolute;
    top: 18px;
    left: 20px;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(196,154,108,0.55);
    font-family: 'DM Sans', sans-serif;
    z-index: 2;
  }

  .hero-date {
    position: absolute;
    top: 18px;
    right: 20px;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: rgba(250,248,245,0.25);
    font-family: 'DM Sans', sans-serif;
    z-index: 2;
  }

  .hero-content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .hero-icon {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: rgba(196,154,108,0.08);
    border: 0.5px solid rgba(196,154,108,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .hero-song {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 15px;
    color: rgba(250,248,245,0.5);
    letter-spacing: 0.04em;
  }

  /* ─── BODY ─── */
  .body {
    padding: 22px 20px 32px;
  }

  .client-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 300;
    color: #faf8f5;
    line-height: 1.1;
  }

  .client-name-secondary {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-weight: 300;
    color: rgba(250,248,245,0.35);
    margin: 3px 0 20px;
    letter-spacing: 0.08em;
  }

  .section-label {
    font-size: 8.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(250,248,245,0.25);
    margin-bottom: 10px;
    font-family: 'DM Sans', sans-serif;
  }

  /* ─── STATS GRID ─── */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 7px;
    margin-bottom: 16px;
  }

  .stat {
    background: rgba(250,248,245,0.035);
    border-radius: 10px;
    padding: 11px 12px 10px;
    border: 0.5px solid rgba(250,248,245,0.06);
    cursor: pointer;
    transition: background 0.2s;
    text-decoration: none;
    display: block;
  }

  .stat:hover {
    background: rgba(250,248,245,0.06);
  }

  .stat-lbl {
    font-size: 8px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 5px;
    font-family: 'DM Sans', sans-serif;
  }

  .stat-val {
    font-family: 'Cormorant Garamond', serif;
    font-size: 21px;
    font-weight: 600;
    display: block;
    line-height: 1;
  }

  .stat-hint {
    font-size: 8px;
    display: block;
    margin-top: 4px;
    opacity: 0.5;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.04em;
  }

  /* stat colour themes */
  .gold .stat-lbl { color: rgba(196,154,108,0.55); }
  .gold .stat-val { color: #c49a6c; }
  .gold .stat-hint { color: #c49a6c; }

  .purple .stat-lbl { color: rgba(167,139,220,0.55); }
  .purple .stat-val { color: #a78bdc; }
  .purple .stat-hint { color: #a78bdc; }

  .teal .stat-lbl { color: rgba(79,191,171,0.55); }
  .teal .stat-val { color: #4fbfab; }
  .teal .stat-hint { color: #4fbfab; }

  .neutral .stat-lbl { color: rgba(250,248,245,0.28); }
  .neutral .stat-val { color: rgba(250,248,245,0.6); }
  .neutral .stat-hint { color: rgba(250,248,245,0.4); }

  /* ─── PRODUCER'S MOMENT ─── */
  .quote-wrap {
    border-left: 1.5px solid rgba(196,154,108,0.3);
    padding: 11px 15px;
    margin: 16px 0 18px;
    background: rgba(196,154,108,0.03);
    border-radius: 0 10px 10px 0;
  }

  .quote {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 15px;
    color: rgba(250,248,245,0.75);
    line-height: 1.6;
    margin-bottom: 7px;
  }

  .quote-attr {
    font-size: 10px;
    color: rgba(250,248,245,0.25);
    letter-spacing: 0.08em;
    font-family: 'DM Sans', sans-serif;
  }

  /* ─── DIVIDER ─── */
  .divider {
    border: none;
    border-top: 0.5px solid rgba(250,248,245,0.06);
    margin: 18px 0;
  }

  /* ─── REBOOK CTA ─── */
  .cta-box {
    background: rgba(196,154,108,0.08);
    border: 0.5px solid rgba(196,154,108,0.22);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }

  .cta-box.expired {
    opacity: 0.4;
    pointer-events: none;
  }

  .cta-eyebrow {
    font-size: 9px;
    color: rgba(250,248,245,0.38);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-family: 'DM Sans', sans-serif;
    margin-bottom: 3px;
  }

  .cta-gift {
    font-size: 13px;
    color: #c49a6c;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    margin-bottom: 3px;
  }

  .cta-countdown {
    font-size: 9px;
    color: rgba(196,154,108,0.5);
    font-family: 'DM Sans', sans-serif;
  }

  .cta-countdown.urgent {
    color: #e07b5a;
  }

  .btn-rebook {
    background: #c49a6c;
    color: #0d0b08;
    font-size: 12px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    padding: 10px 18px;
    border-radius: 24px;
    border: none;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    letter-spacing: 0.02em;
    text-decoration: none;
    display: inline-block;
  }

  /* ─── FOOTER BUTTONS ─── */
  .footer-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  .btn-footer {
    flex: 1;
    background: rgba(250,248,245,0.04);
    border: 0.5px solid rgba(250,248,245,0.09);
    border-radius: 24px;
    color: rgba(250,248,245,0.45);
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    padding: 10px 12px;
    text-align: center;
    letter-spacing: 0.04em;
    cursor: pointer;
    text-decoration: none;
    display: block;
    transition: background 0.2s;
  }

  .btn-footer:hover {
    background: rgba(250,248,245,0.07);
  }

  /* ─── LOGO ─── */
  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 10px;
    color: rgba(196,154,108,0.22);
    text-align: center;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  /* ─── LOADING / ERROR STATES ─── */
  .state-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 40px;
  }

  .state-icon {
    font-family: 'Cormorant Garamond', serif;
    font-size: 48px;
    color: rgba(196,154,108,0.3);
  }

  .state-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    color: rgba(250,248,245,0.6);
    text-align: center;
  }

  .state-sub {
    font-size: 12px;
    color: rgba(250,248,245,0.25);
    text-align: center;
    letter-spacing: 0.06em;
    line-height: 1.7;
  }

  .loading-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(196,154,108,0.4);
    display: inline-block;
    margin: 0 3px;
    animation: pulse 1.4s ease-in-out infinite;
  }

  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 480px) {
    .card { max-width: 100%; }
    .hero { height: 240px; }
  }
</style>
</head>
<body>

<div id="app">
  <div class="state-screen">
    <div>
      <span class="loading-dot"></span>
      <span class="loading-dot"></span>
      <span class="loading-dot"></span>
    </div>
    <p class="state-title">Loading your session</p>
  </div>
</div>

<script>
  // ─── YOUR CREDENTIALS ───────────────────────────────────────
  const AIRTABLE_TOKEN  = 'YOUR_AIRTABLE_TOKEN_HERE';
  const AIRTABLE_BASE   = 'app1UkpbWk0Y6aAUG';
  const BOOKING_URL     = 'YOUR_ACUITY_BOOKING_URL_HERE';
  const GOOGLE_PLACE_ID = 'YOUR_GOOGLE_PLACE_ID_HERE';
  // ────────────────────────────────────────────────────────────

  // Parse slug from URL: /session/42-mei-ling → "42-mei-ling"
  function getSlug() {
    const parts = window.location.pathname.split('/session/');
    return parts[1] ? parts[1].replace(/\/$/, '') : null;
  }

  // Extract session ID number from slug
  function getSessionId(slug) {
    return slug ? slug.split('-')[0] : null;
  }

  // Format date nicely
  function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-SG', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  // Calculate days since session
  function daysSince(dateStr) {
    if (!dateStr) return 999;
    const session = new Date(dateStr);
    const now = new Date();
    return Math.floor((now - session) / (1000 * 60 * 60 * 24));
  }

  // Rebook gift by session type
  function getGift(sessionType) {
    if (sessionType === 'Production') return 'Free 30-min vocal coaching consult';
    return 'Complimentary NFC CD (worth $20)';
  }

  // Render stat "what does this mean?" link
  function statLink(anchor) {
    return `https://hsmusicstudio.sg/vocal-guide#${anchor}`;
  }

  // Render the full card
  function renderCard(r) {
    const f = r.fields;
    const sessionType = f['Session type'] || 'Studio Experience';
    const isProduction = sessionType === 'Production';
    const days = daysSince(f['Session date']);
    const rebookActive = f['Rebook offer active'] !== false;
    const daysLeft = 7 - days;
    const rebookExpired = days > 7 || !rebookActive;

    // Hero photo
    const photoStyle = f['Session photo URL']
      ? `background-image: url('${f['Session photo URL']}');`
      : '';

    // Stat 3: voice type (Studio) or tracks recorded (Production)
    const stat3Label = isProduction ? 'Tracks recorded' : 'Voice type';
    const stat3Value = isProduction
      ? (f['Tracks recorded'] || '—')
      : (f['Voice type'] || '—');
    const stat3Class = 'purple';

    // Stat 6: song difficulty (Studio) or harmonies captured (Production)
    const stat6Label = isProduction ? 'Harmonies' : 'Difficulty';
    const stat6Value = isProduction
      ? (f['Harmonies captured'] || '—')
      : (f['Song difficulty'] || '—');

    // Countdown text
    let countdownHtml = '';
    if (!rebookExpired) {
      const urgent = daysLeft <= 3;
      countdownHtml = `<p class="cta-countdown ${urgent ? 'urgent' : ''}">${daysLeft} day${daysLeft !== 1 ? 's' : ''} remaining</p>`;
    }

    document.getElementById('app').innerHTML = `
      <div class="card">

        <div class="hero">
          ${photoStyle ? `<div class="hero-photo" style="${photoStyle}"></div><div class="hero-overlay"></div>` : '<span class="hero-bg-text">HS</span>'}
          <span class="hero-tag">${sessionType}</span>
          <span class="hero-date">${formatDate(f['Session date'])}${f['Room'] ? ' · ' + f['Room'] : ''}</span>
          <div class="hero-content">
            <div class="hero-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#c49a6c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="2" width="6" height="12" rx="3"/>
                <path d="M5 10a7 7 0 0 0 14 0"/>
                <line x1="12" y1="17" x2="12" y2="21"/>
                <line x1="8" y1="21" x2="16" y2="21"/>
              </svg>
            </div>
            <span class="hero-song">${f['Song / project title'] || ''}</span>
          </div>
        </div>

        <div class="body">

          <p class="client-name">${f['Client Name'] || ''}</p>
          ${f['Client name (secondary)'] ? `<p class="client-name-secondary">${f['Client name (secondary)']}</p>` : '<div style="margin-bottom:20px;"></div>'}

          <p class="section-label">Your voice, by the numbers</p>

          <div class="stats-grid">
            <a class="stat gold" href="${statLink('highest-note')}" target="_blank">
              <span class="stat-lbl">Highest note</span>
              <span class="stat-val">${f['Highest note'] || '—'}</span>
              <span class="stat-hint">tap to learn</span>
            </a>
            <a class="stat gold" href="${statLink('lowest-note')}" target="_blank">
              <span class="stat-lbl">Lowest note</span>
              <span class="stat-val">${f['Lowest note'] || '—'}</span>
              <span class="stat-hint">tap to learn</span>
            </a>
            <a class="stat ${stat3Class}" href="${statLink('voice-type')}" target="_blank">
              <span class="stat-lbl">${stat3Label}</span>
              <span class="stat-val" style="font-size:${String(stat3Value).length > 5 ? '13px' : '21px'};padding-top:${String(stat3Value).length > 5 ? '4px' : '0'}">${stat3Value}</span>
              <span class="stat-hint">tap to learn</span>
            </a>
            <div class="stat neutral">
              <span class="stat-lbl">Takes</span>
              <span class="stat-val">${f['Takes recorded'] || '—'}</span>
            </div>
            <a class="stat gold" href="${statLink('the-flip')}" target="_blank">
              <span class="stat-lbl">The flip</span>
              <span class="stat-val">${f['The flip'] || '—'}</span>
              <span class="stat-hint">tap to learn</span>
            </a>
            <div class="stat teal">
              <span class="stat-lbl">${stat6Label}</span>
              <span class="stat-val" style="font-size:${String(stat6Value).length > 5 ? '13px' : '21px'};padding-top:${String(stat6Value).length > 5 ? '4px' : '0'}">${stat6Value}</span>
            </div>
          </div>

          ${f["Producer's moment"] ? `
          <div class="quote-wrap">
            <p class="quote">"${f["Producer's moment"]}"</p>
            <span class="quote-attr">— Your coach @ HS Music Studio</span>
          </div>` : ''}

          <hr class="divider">

          <div class="cta-box ${rebookExpired ? 'expired' : ''}">
            <div>
              <p class="cta-eyebrow">${rebookExpired ? 'See you next time' : 'Rebook within 7 days'}</p>
              <p class="cta-gift">${rebookExpired ? 'Your card is saved forever' : getGift(sessionType)}</p>
              ${countdownHtml}
            </div>
            ${!rebookExpired ? `<a class="btn-rebook" href="${BOOKING_URL}" target="_blank">Book now</a>` : ''}
          </div>

          <div class="footer-row">
            <a class="btn-footer" id="share-btn" href="#">Share this card</a>
            <a class="btn-footer" href="https://search.google.com/local/writereview?placeid=${GOOGLE_PLACE_ID}" target="_blank">Leave us a review</a>
          </div>

          <p class="logo">HS Music Studio</p>

        </div>
      </div>
    `;

    // Native share
    document.getElementById('share-btn').addEventListener('click', function(e) {
      e.preventDefault();
      if (navigator.share) {
        navigator.share({
          title: 'My HS Music Studio Session',
          text: `Check out my session card from HS Music Studio!`,
          url: window.location.href
        });
      } else {
        navigator.clipboard.writeText(window.location.href).then(() => {
          this.textContent = 'Link copied!';
          setTimeout(() => this.textContent = 'Share this card', 2000);
        });
      }
    });
  }

  function showError(msg) {
    document.getElementById('app').innerHTML = `
      <div class="state-screen">
        <p class="state-icon">♩</p>
        <p class="state-title">Session not found</p>
        <p class="state-sub">${msg}</p>
      </div>
    `;
  }

  async function init() {
    const slug = getSlug();
    if (!slug) return showError('No session ID in this URL.');

    const sessionId = getSessionId(slug);
    if (!sessionId) return showError('Invalid session link.');

    try {
      const url = `https://api.airtable.com/v0/${AIRTABLE_BASE}/Sessions?filterByFormula={Session ID}=${sessionId}&maxRecords=1`;
      const res = await fetch(url, {
        headers: { 'Authorization': `Bearer ${AIRTABLE_TOKEN}` }
      });

      if (!res.ok) throw new Error(`API error: ${res.status}`);

      const data = await res.json();
      if (!data.records || data.records.length === 0) {
        return showError('This session card doesn\'t exist yet.');
      }

      renderCard(data.records[0]);

    } catch (err) {
      showError('Something went wrong loading this card.<br>Please try again shortly.');
      console.error(err);
    }
  }

  init();
</script>
</body>
</html>
